<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gestion Flotte Maroc</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#060d1a;color:#f1f5f9;font-family:'Segoe UI',sans-serif;min-height:100vh}
.hidden{display:none!important}

/* LOGIN */
#loginPage{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;background:linear-gradient(135deg,#060d1a,#0a1628)}
.login-box{background:#0d1829;border:1px solid #1a2744;border-radius:20px;padding:40px;width:100%;max-width:420px}
.logo{text-align:center;margin-bottom:28px}
.logo-icon{width:60px;height:60px;background:linear-gradient(135deg,#f97316,#ea580c);border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:26px;font-weight:900;margin:0 auto 12px;color:#fff}
.logo h1{font-size:20px;font-weight:900;letter-spacing:0.5px}
.logo p{font-size:11px;color:#f97316;font-weight:700;letter-spacing:1.5px;margin-top:4px}
.field{margin-bottom:16px}
.field label{display:block;font-size:11px;font-weight:700;color:#94a3b8;margin-bottom:6px;text-transform:uppercase;letter-spacing:0.8px}
.field input{width:100%;padding:12px 14px;background:#0a1520;border:1px solid #1a2744;border-radius:10px;color:#f1f5f9;font-size:14px;outline:none;transition:border-color 0.2s}
.field input:focus{border-color:#f97316}
.btn-primary{width:100%;padding:14px;border-radius:12px;border:none;background:linear-gradient(135deg,#f97316,#ea580c);color:#fff;font-weight:800;font-size:15px;cursor:pointer;margin-top:8px}
.btn-primary:hover{opacity:0.9}
.error-msg{color:#ef4444;font-size:13px;margin-top:10px;text-align:center;display:none}

/* APP */
#appPage{display:none;flex:1}
.app-layout{display:flex;min-height:100vh}

/* SIDEBAR */
.sidebar{width:240px;background:#080f1e;border-right:1px solid #1a2744;display:flex;flex-direction:column;flex-shrink:0;position:fixed;top:0;left:0;height:100vh;z-index:100;overflow-y:auto}
.sidebar-header{padding:18px 16px;border-bottom:1px solid #1a2744;display:flex;align-items:center;gap:10px}
.sidebar-logo{width:36px;height:36px;background:linear-gradient(135deg,#f97316,#ea580c);border-radius:10px;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:14px;flex-shrink:0}
.sidebar-title{font-size:13px;font-weight:800;line-height:1.3}
.sidebar-subtitle{font-size:9px;color:#f97316;font-weight:700;letter-spacing:1px}
.sidebar-nav{flex:1;padding:8px 6px}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:8px;cursor:pointer;font-size:12px;font-weight:500;color:#94a3b8;border:none;background:transparent;width:100%;text-align:left;border-left:3px solid transparent;transition:all 0.2s;margin-bottom:2px}
.nav-item:hover{background:#ffffff10;color:#f1f5f9}
.nav-item.active{background:#f9731615;color:#f97316;font-weight:700;border-left-color:#f97316}
.nav-item .icon{font-size:14px;flex-shrink:0}
.nav-badge{background:#ef4444;color:white;font-size:10px;font-weight:800;padding:1px 6px;border-radius:10px;margin-left:auto}
.sidebar-footer{padding:12px 14px;border-top:1px solid #1a2744}
.user-info{display:flex;align-items:center;gap:10px}
.user-avatar{width:32px;height:32px;background:linear-gradient(135deg,#3b82f6,#1d4ed8);border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:12px;flex-shrink:0}
.user-name{font-size:12px;font-weight:700;color:#f1f5f9}
.user-role{font-size:10px;color:#94a3b8}
.license-badge{margin-top:8px;padding:4px 10px;border-radius:6px;font-size:10px;font-weight:700;text-align:center}

/* MAIN */
.main-content{margin-left:240px;flex:1;min-height:100vh;background:#060d1a}
.topbar{height:50px;background:#080f1e;border-bottom:1px solid #1a2744;display:flex;align-items:center;justify-content:space-between;padding:0 24px;position:sticky;top:0;z-index:50}
.topbar-title{font-size:12px;font-weight:700;color:#475569;letter-spacing:0.5px}
.topbar-actions{display:flex;gap:10px;align-items:center}
.badge-expire{padding:4px 10px;border-radius:6px;background:#ef444418;border:1px solid #ef444430;font-size:11px;font-weight:700;color:#ef4444}
.btn-super{padding:5px 12px;border-radius:8px;border:1px solid #f59e0b40;background:#f59e0b18;color:#f59e0b;font-weight:700;cursor:pointer;font-size:11px}
.btn-logout{padding:5px 12px;border-radius:8px;border:1px solid #1a2744;background:transparent;color:#94a3b8;cursor:pointer;font-size:11px}
.page{padding:28px;display:none}
.page.active{display:block}

/* CARDS */
.card{background:#0d1829;border:1px solid #1a2744;border-radius:16px;padding:24px}
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px}
.stat-card{background:#0d1829;border:1px solid #1a2744;border-radius:16px;padding:20px}
.stat-icon{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;margin-bottom:12px}
.stat-value{font-size:24px;font-weight:800;letter-spacing:-0.5px}
.stat-label{font-size:12px;color:#94a3b8;margin-top:2px}
.page-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px}
.page-title{font-size:24px;font-weight:800}
.page-sub{font-size:13px;color:#94a3b8;margin-top:4px}

/* BUTTONS */
.btn{padding:9px 18px;border-radius:10px;border:none;cursor:pointer;font-weight:700;font-size:13px;transition:all 0.15s}
.btn:hover{transform:translateY(-1px);opacity:0.9}
.btn-orange{background:linear-gradient(135deg,#f97316,#ea580c);color:#fff}
.btn-ghost{background:transparent;border:1px solid #1a2744;color:#94a3b8}
.btn-danger{background:#ef444418;border:1px solid #ef444440;color:#ef4444}
.btn-success{background:#22c55e18;border:1px solid #22c55e40;color:#22c55e}
.btn-sm{padding:5px 12px;font-size:11px;border-radius:8px}

/* TABLE */
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse}
th{padding:8px 12px;text-align:left;font-size:11px;font-weight:700;color:#475569;text-transform:uppercase;border-bottom:1px solid #1a2744}
td{padding:12px;font-size:13px;border-bottom:1px solid #0f1e35}
tr:hover td{background:#ffffff04}

/* BADGE */
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700}
.badge-dot{width:5px;height:5px;border-radius:50%}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:#00000090;z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px;display:none}
.modal-overlay.open{display:flex}
.modal{background:#0d1829;border:1px solid #1a2744;border-radius:20px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto}
.modal-header{padding:20px 24px;border-bottom:1px solid #1a2744;display:flex;justify-content:space-between;align-items:center}
.modal-body{padding:24px}
.modal-footer{padding:0 24px 24px;display:flex;gap:10px;justify-content:flex-end}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.form-field{margin-bottom:0}
.form-field label{display:block;font-size:11px;font-weight:700;color:#94a3b8;margin-bottom:6px;text-transform:uppercase}
.form-field input,.form-field select,.form-field textarea{width:100%;padding:10px 14px;background:#0a1520;border:1px solid #1a2744;border-radius:10px;color:#f1f5f9;font-size:13px;outline:none;box-sizing:border-box}
.form-field input:focus,.form-field select:focus{border-color:#f97316}
.full-width{grid-column:1/-1}

/* SUPER ADMIN */
.admin-panel{padding:28px}
.plan-cards{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:24px}
.plan-card{padding:20px;border-radius:16px;border:2px solid #1a2744;cursor:pointer;text-align:center;transition:all 0.2s}
.plan-card.selected{border-color:#f97316;background:#f9731610}

/* ALERTS */
.alert-card{background:#0d1829;border:1px solid #1a2744;border-radius:12px;padding:16px;margin-bottom:10px;border-left-width:4px;display:flex;align-items:center;gap:14px}
.alert-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}

/* SEARCH */
.search-bar{padding:9px 14px;background:#0a1520;border:1px solid #1a2744;border-radius:10px;color:#f1f5f9;font-size:13px;outline:none;width:280px}
.search-bar:focus{border-color:#f97316}
.filter-btns{display:flex;gap:6px;flex-wrap:wrap}
.filter-btn{padding:5px 12px;border-radius:20px;border:1px solid #1a2744;background:transparent;color:#94a3b8;font-size:11px;font-weight:700;cursor:pointer}
.filter-btn.active{border-color:#f97316;background:#f9731620;color:#f97316}

/* TOAST */
#toastContainer{position:fixed;top:20px;right:20px;z-index:9999;display:flex;flex-direction:column;gap:8px}
.toast{padding:12px 18px;border-radius:12px;color:#fff;font-size:13px;font-weight:700;cursor:pointer;min-width:260px;animation:slideIn 0.3s ease;box-shadow:0 8px 24px #00000060}
@keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
.toast-success{background:#16a34a}
.toast-error{background:#dc2626}
.toast-info{background:#1d4ed8}

/* CONFIRM */
#confirmModal .modal{max-width:400px}

/* RESPONSIVE */
@media(max-width:768px){
  .sidebar{width:60px}
  .sidebar-title,.sidebar-subtitle,.nav-item span:not(.icon),.user-name,.user-role,.nav-badge{display:none}
  .main-content{margin-left:60px}
  .stats-grid{grid-template-columns:repeat(2,1fr)}
  .form-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>

<div id="toastContainer"></div>

<!-- LOGIN PAGE -->
<div id="loginPage">
  <div class="login-box">
    <div class="logo">
      <div class="logo-icon">GF</div>
      <h1>GESTION FLOTTE MAROC</h1>
      <p>SOLUTION PRO TRANSPORT</p>
    </div>
    <div class="field">
      <label>Email</label>
      <input type="email" id="loginEmail" placeholder="votre@email.com" autocomplete="email">
    </div>
    <div class="field">
      <label>Mot de passe</label>
      <input type="password" id="loginPassword" placeholder="••••••••" autocomplete="current-password">
    </div>
    <button class="btn-primary" onclick="doLogin()">Se connecter</button>
    <div class="error-msg" id="loginError"></div>
  </div>
</div>

<!-- APP PAGE -->
<div id="appPage">
  <div class="app-layout">
    <!-- SIDEBAR -->
    <div class="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-logo">GF</div>
        <div>
          <div class="sidebar-title">GESTION FLOTTE</div>
          <div class="sidebar-subtitle">MAROC</div>
        </div>
      </div>
      <nav class="sidebar-nav" id="sidebarNav"></nav>
      <div class="sidebar-footer">
        <div class="user-info">
          <div class="user-avatar" id="userAvatar">??</div>
          <div>
            <div class="user-name" id="userName">-</div>
            <div class="user-role" id="userRoleLabel">-</div>
          </div>
        </div>
        <div class="license-badge" id="licenseBadge"></div>
      </div>
    </div>

    <!-- MAIN -->
    <div class="main-content">
      <div class="topbar">
        <div class="topbar-title">GESTION FLOTTE MAROC</div>
        <div class="topbar-actions">
          <div id="expireBadge" class="badge-expire hidden"></div>
          <button id="btnSuperAdmin" class="btn-super hidden" onclick="showPage('superadmin')">👑 Super Admin</button>
          <button class="btn-logout" onclick="doLogout()">Déconnexion</button>
        </div>
      </div>

      <!-- PAGES -->
      <div id="page-dashboard" class="page active"></div>
      <div id="page-vehicles" class="page"></div>
      <div id="page-drivers" class="page"></div>
      <div id="page-missions" class="page"></div>
      <div id="page-invoices" class="page"></div>
      <div id="page-fuel" class="page"></div>
      <div id="page-maintenance" class="page"></div>
      <div id="page-expenses" class="page"></div>
      <div id="page-alerts" class="page"></div>
      <div id="page-superadmin" class="page"></div>
    </div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="mainModal">
  <div class="modal">
    <div class="modal-header">
      <h3 id="modalTitle" style="font-size:16px;font-weight:800"></h3>
      <button onclick="closeModal()" style="background:none;border:none;color:#94a3b8;font-size:20px;cursor:pointer">✕</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
    <div class="modal-footer" id="modalFooter"></div>
  </div>
</div>

<!-- CONFIRM -->
<div class="modal-overlay" id="confirmModal">
  <div class="modal">
    <div class="modal-header"><h3 id="confirmTitle" style="font-size:16px;font-weight:800"></h3></div>
    <div class="modal-body"><p id="confirmMsg" style="color:#94a3b8;font-size:14px;line-height:1.6"></p></div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="document.getElementById('confirmModal').classList.remove('open')">Annuler</button>
      <button class="btn btn-danger" id="confirmBtn">Confirmer</button>
    </div>
  </div>
</div>

<script>
// ─── STATE ────────────────────────────────────────────────────────────────────
let token = localStorage.getItem('gfm_token');
let currentAccount = null;
let currentPage = 'dashboard';
let state = { vehicles:[], drivers:[], missions:[], invoices:[], fuels:[], expenses:[], maintenances:[], leaves:[], alerts:[] };

// ─── API ──────────────────────────────────────────────────────────────────────
async function api(method, url, body) {
  const opts = { method, headers: { 'Content-Type':'application/json' } };
  if (token) opts.headers['Authorization'] = 'Bearer ' + token;
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(url, opts);
  const data = await res.json();
  if (!res.ok) throw data;
  return data;
}

// ─── TOAST ────────────────────────────────────────────────────────────────────
function toast(msg, type='info') {
  const t = document.createElement('div');
  t.className = 'toast toast-' + type;
  t.textContent = msg;
  t.onclick = () => t.remove();
  document.getElementById('toastContainer').appendChild(t);
  setTimeout(() => t.remove(), 3500);
}

// ─── AUTH ─────────────────────────────────────────────────────────────────────
async function doLogin() {
  const email = document.getElementById('loginEmail').value.trim();
  const password = document.getElementById('loginPassword').value;
  const errEl = document.getElementById('loginError');
  errEl.style.display = 'none';
  try {
    const data = await api('POST', '/api/login', { email, password });
    token = data.token;
    localStorage.setItem('gfm_token', token);
    currentAccount = data.account;
    initApp();
  } catch(e) {
    errEl.textContent = e.error || 'Erreur de connexion';
    errEl.style.display = 'block';
  }
}

document.addEventListener('keydown', e => { if(e.key==='Enter' && document.getElementById('loginPage').style.display!=='none') doLogin(); });

function doLogout() {
  localStorage.removeItem('gfm_token');
  token = null;
  currentAccount = null;
  document.getElementById('loginPage').style.display = 'flex';
  document.getElementById('appPage').style.display = 'none';
}

// ─── INIT APP ─────────────────────────────────────────────────────────────────
async function initApp() {
  document.getElementById('loginPage').style.display = 'none';
  document.getElementById('appPage').style.display = 'flex';

  // User info
  const name = currentAccount.name;
  const initials = name.split(' ').map(n=>n[0]).join('').slice(0,2).toUpperCase();
  document.getElementById('userAvatar').textContent = initials;
  document.getElementById('userName').textContent = name;
  document.getElementById('userRoleLabel').textContent = currentAccount.role === 'super' ? 'Super Admin' : currentAccount.company || 'Client';

  // License badge
  const lic = document.getElementById('licenseBadge');
  if (currentAccount.role === 'super') {
    lic.textContent = '👑 Super Admin';
    lic.style.cssText = 'background:#f59e0b20;color:#f59e0b;border:1px solid #f59e0b40';
    document.getElementById('btnSuperAdmin').classList.remove('hidden');
  } else if (currentAccount.plan === 'life') {
    lic.textContent = '∞ Licence à vie';
    lic.style.cssText = 'background:#22c55e20;color:#22c55e;border:1px solid #22c55e40';
  } else {
    const days = Math.max(0, Math.ceil((new Date(currentAccount.expires_at)-new Date())/86400000));
    lic.textContent = days + 'j restants';
    lic.style.cssText = (days<=7?'background:#ef444418;color:#ef4444;border:1px solid #ef444430':'background:#3b82f618;color:#3b82f6;border:1px solid #3b82f630');
    if (days <= 7) {
      document.getElementById('expireBadge').textContent = '⚠ Licence expire dans ' + days + 'j';
      document.getElementById('expireBadge').classList.remove('hidden');
    }
  }

  // Build sidebar
  buildSidebar();

  // Load all data
  await loadAll();
  showPage('dashboard');
}

function buildSidebar() {
  const isSuper = currentAccount.role === 'super';
  const items = [
    {id:'dashboard', icon:'📊', label:'Dashboard'},
    {id:'vehicles', icon:'🚛', label:'Flotte'},
    {id:'drivers', icon:'👤', label:'Chauffeurs'},
    {id:'missions', icon:'🗺', label:'Missions'},
    {id:'invoices', icon:'📄', label:'Facturation'},
    {id:'fuel', icon:'⛽', label:'Carburant'},
    {id:'maintenance', icon:'🔧', label:'Maintenance'},
    {id:'expenses', icon:'💸', label:'Dépenses'},
    {id:'alerts', icon:'🔔', label:'Alertes', badge:true},
  ];
  if (isSuper) items.push({id:'superadmin', icon:'👑', label:'Super Admin'});

  const nav = document.getElementById('sidebarNav');
  nav.innerHTML = items.map(it => `
    <button class="nav-item" id="nav-${it.id}" onclick="showPage('${it.id}')">
      <span class="icon">${it.icon}</span>
      <span>${it.label}</span>
      ${it.badge ? '<span class="nav-badge hidden" id="alertBadge">0</span>' : ''}
    </button>
  `).join('');
}

async function loadAll() {
  try {
    const endpoints = ['vehicles','drivers','missions','invoices','fuels','expenses','maintenances','leaves','alerts'];
    const results = await Promise.all(endpoints.map(e => api('GET', '/api/'+e)));
    endpoints.forEach((e,i) => {
      const key = e==='fuels'?'fuels':e==='maintenances'?'maintenances':e==='leaves'?'leaves':e;
      state[e] = results[i];
    });
    // Update alert badge
    const unread = state.alerts.filter(a=>!a.read).length;
    const badge = document.getElementById('alertBadge');
    if (badge) { badge.textContent = unread; badge.classList.toggle('hidden', unread===0); }
  } catch(e) { console.error('Load error:', e); }
}

// ─── NAVIGATION ───────────────────────────────────────────────────────────────
function showPage(page) {
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  const el = document.getElementById('page-'+page);
  const nav = document.getElementById('nav-'+page);
  if (el) el.classList.add('active');
  if (nav) nav.classList.add('active');
  currentPage = page;
  renderPage(page);
}

function renderPage(page) {
  const el = document.getElementById('page-'+page);
  if (!el) return;
  switch(page) {
    case 'dashboard': renderDashboard(el); break;
    case 'vehicles': renderVehicles(el); break;
    case 'drivers': renderDrivers(el); break;
    case 'missions': renderMissions(el); break;
    case 'invoices': renderInvoices(el); break;
    case 'fuel': renderFuel(el); break;
    case 'maintenance': renderMaintenance(el); break;
    case 'expenses': renderExpenses(el); break;
    case 'alerts': renderAlerts(el); break;
    case 'superadmin': renderSuperAdmin(el); break;
  }
}

// ─── HELPERS ──────────────────────────────────────────────────────────────────
function fmtMAD(n) { return Number(n||0).toLocaleString('fr-MA') + ' MAD'; }
function badge(status) {
  const colors = {en_cours:'#f97316',en_route:'#f97316',termine:'#22c55e',disponible:'#22c55e',planifie:'#3b82f6',annule:'#ef4444',maintenance:'#f59e0b',conge:'#a855f7',retard:'#ef4444',paye:'#22c55e',en_attente:'#f59e0b',actif:'#22c55e',approuve:'#22c55e',refuse:'#ef4444',urgent:'#ef4444',warning:'#f59e0b',info:'#3b82f6',active:'#22c55e',suspended:'#ef4444'};
  const labels = {en_cours:'En cours',en_route:'En route',termine:'Terminé',disponible:'Disponible',planifie:'Planifié',annule:'Annulé',maintenance:'Maintenance',conge:'Congé',retard:'Retard',paye:'Payé',en_attente:'En attente',actif:'Actif',approuve:'Approuvé',refuse:'Refusé',urgent:'Urgent',warning:'Attention',info:'Info',active:'Actif',suspended:'Suspendu'};
  const c = colors[status]||'#64748b';
  return `<span class="badge" style="background:${c}20;color:${c}"><span class="badge-dot" style="background:${c}"></span>${labels[status]||status}</span>`;
}

function confirm(title, msg, cb) {
  document.getElementById('confirmTitle').textContent = title;
  document.getElementById('confirmMsg').textContent = msg;
  document.getElementById('confirmModal').classList.add('open');
  document.getElementById('confirmBtn').onclick = () => { cb(); document.getElementById('confirmModal').classList.remove('open'); };
}

function openModal(title, bodyHtml, footerHtml) {
  document.getElementById('modalTitle').textContent = title;
  document.getElementById('modalBody').innerHTML = bodyHtml;
  document.getElementById('modalFooter').innerHTML = footerHtml;
  document.getElementById('mainModal').classList.add('open');
}
function closeModal() { document.getElementById('mainModal').classList.remove('open'); }

// ─── DASHBOARD ────────────────────────────────────────────────────────────────
async function renderDashboard(el) {
  let stats = {};
  try { stats = await api('GET', '/api/stats'); } catch(e) {}
  const v = state.vehicles || [];
  const m = state.missions || [];
  const inv = state.invoices || [];
  el.innerHTML = `

    <div class="form-grid">
      <div class="form-field"><label>Nom complet *</label><input id="a_name" placeholder="Mohammed Alami"></div>
      <div class="form-field"><label>Email *</label><input type="email" id="a_email" placeholder="client@email.ma"></div>
      <div class="form-field"><label>Mot de passe *</label><input type="password" id="a_pass" placeholder="Minimum 6 caractères"></div>
      <div class="form-field"><label>Entreprise</label><input id="a_company" placeholder="Transport Alami"></div>
      <div class="form-field"><label>Téléphone</label><input id="a_phone" placeholder="0661234567"></div>
      <div class="form-field"><label>Plan</label>
        <select id="a_plan">
          <option value="month">30 Jours — 499 MAD</option>
          <option value="year">1 An — 4 990 MAD</option>
          <option value="life">À Vie — 19 999 MAD</option>
        </select>
      </div>
    </div>`,
    `<button class="btn btn-ghost" onclick="closeModal()">Annuler</button>
     <button class="btn btn-orange" onclick="saveNewAccount()">Créer le compte</button>`
  );
}

async function saveNewAccount() {
  const data = { name:document.getElementById('a_name').value, email:document.getElementById('a_email').value, password:document.getElementById('a_pass').value, company:document.getElementById('a_company').value, phone:document.getElementById('a_phone').value, plan:document.getElementById('a_plan').value };
  if(!data.name||!data.email||!data.password){toast('Nom, email et mot de passe requis','error');return;}
  if(data.password.length<6){toast('Mot de passe trop court (min 6 car.)','error');return;}
  try {
    await api('POST','/api/admin/accounts',data);
    closeModal(); renderPage('superadmin');
    toast(`Compte créé pour ${data.name} ✓`,'success');
  } catch(e){toast(e.error||'Erreur','error');}
}

async function editAccountForm(id) {
  let accounts = [];
  try { accounts = await api('GET','/api/admin/accounts'); } catch(e){}
  const a = accounts.find(x=>x.id==id);
  if(!a) return;
  openModal('Modifier le compte', `
    <div class="form-grid">
      <div class="form-field"><label>Nom</label><input id="a_name" value="${a.name}"></div>
      <div class="form-field"><label>Email</label><input type="email" id="a_email" value="${a.email}"></div>
      <div class="form-field"><label>Nouveau MDP (laisser vide = inchangé)</label><input type="password" id="a_pass" placeholder="Nouveau mot de passe"></div>
      <div class="form-field"><label>Entreprise</label><input id="a_company" value="${a.company||''}"></div>
      <div class="form-field"><label>Téléphone</label><input id="a_phone" value="${a.phone||''}"></div>
      <div class="form-field"><label>Plan</label>
        <select id="a_plan">
          <option value="month" ${a.plan==='month'?'selected':''}>30 Jours</option>
          <option value="year" ${a.plan==='year'?'selected':''}>1 An</option>
          <option value="life" ${a.plan==='life'?'selected':''}>À Vie</option>
        </select>
      </div>
      <div class="form-field"><label>Statut</label>
        <select id="a_status">
          <option value="active" ${a.status==='active'?'selected':''}>Actif</option>
          <option value="suspended" ${a.status==='suspended'?'selected':''}>Suspendu</option>
        </select>
      </div>
    </div>`,
    `<button class="btn btn-ghost" onclick="closeModal()">Annuler</button>
     <button class="btn btn-orange" onclick="updateAccount(${id})">Enregistrer</button>`
  );
}

async function updateAccount(id) {
  const data = { name:document.getElementById('a_name').value, email:document.getElementById('a_email').value, company:document.getElementById('a_company').value, phone:document.getElementById('a_phone').value, plan:document.getElementById('a_plan').value, status:document.getElementById('a_status').value };
  const pass = document.getElementById('a_pass').value;
  if(pass) data.newPassword = pass;
  try {
    await api('PUT','/api/admin/accounts/'+id,data);
    closeModal(); renderPage('superadmin'); toast('Compte mis à jour','success');
  } catch(e){toast(e.error||'Erreur','error');}
}

async function extendAccount(id) {
  try { await api('POST','/api/admin/accounts/'+id+'/extend',{days:30}); renderPage('superadmin'); toast('+30 jours ajoutés','success'); } catch(e){toast(e.error||'Erreur','error');}
}

async function toggleAccount(id, status) {
  const newStatus = status==='active'?'suspended':'active';
  try { await api('PUT','/api/admin/accounts/'+id,{status:newStatus}); renderPage('superadmin'); toast(newStatus==='active'?'Compte activé':'Compte suspendu','success'); } catch(e){toast(e.error||'Erreur','error');}
}

async function deleteAccount(id) {
  confirm('Supprimer le compte', 'Toutes les données de ce client seront supprimées définitivement. Confirmer ?', async () => {
    try { await api('DELETE','/api/admin/accounts/'+id); renderPage('superadmin'); toast('Compte supprimé','success'); } catch(e){toast(e.error||'Erreur','error');}
  });
}

// ─── AUTO LOGIN ───────────────────────────────────────────────────────────────
window.onload = async () => {
  if (token) {
    try {
      currentAccount = await api('GET','/api/me');
      initApp();
    } catch(e) {
      localStorage.removeItem('gfm_token');
      token = null;
    }
  }
};

// Enter key on login
document.getElementById('loginPassword').addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); });
</script>
